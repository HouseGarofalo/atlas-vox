# Atlas Vox — Prometheus scrape configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "atlas-vox-backend"
    metrics_path: "/api/v1/metrics"
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: "atlas-vox"
          component: "backend"
