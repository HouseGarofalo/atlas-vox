# GPU override — extends docker-compose.yml
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.gpu.yml up

services:
  gpu-worker:
    container_name: atlas-vox-gpu-worker
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu-worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://atlas_vox:${POSTGRES_PASSWORD:-atlas-vox-pg}@atlas-vox-postgres:5432/atlas_vox
      - REDIS_URL=redis://:${REDIS_PASSWORD:-atlas-vox-redis}@atlas-vox-redis:6379/1
      - STORAGE_PATH=/app/storage
      - COQUI_XTTS_GPU_MODE=docker_gpu
      - STYLETTS2_GPU_MODE=docker_gpu
      - COSYVOICE_GPU_MODE=docker_gpu
      - DIA_GPU_MODE=docker_gpu
      - DIA2_GPU_MODE=docker_gpu
    volumes:
      - storage_data:/app/storage
    depends_on:
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
