# Atlas Vox — Monitoring Stack Overlay
# Usage: docker compose -f docker-compose.yml -f docker/docker-compose.monitoring.yml up
#
# Adds Prometheus + Grafana to the existing stack.

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: atlas-vox-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - atlas-vox

  grafana:
    image: grafana/grafana:11.0.0
    container_name: atlas-vox-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=atlas-vox
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - atlas-vox

volumes:
  prometheus-data:
  grafana-data:

networks:
  atlas-vox:
    external: true
