name: atlas-vox

services:
  postgres:
    container_name: atlas-vox-postgres
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=atlas_vox
      - POSTGRES_USER=atlas_vox
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas_vox"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - backend
    restart: unless-stopped

  backend:
    container_name: atlas-vox-backend
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "${BACKEND_PORT:-8100}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://atlas_vox:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@atlas-vox-postgres:5432/atlas_vox
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@atlas-vox-redis:6379/1
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set}
      - STORAGE_PATH=/app/storage
      - PORT=8000
      - GPU_SERVICE_URL=http://host.docker.internal:8200
      - APP_ENV=${APP_ENV:-production}
      - HF_HOME=/home/app/.cache/huggingface
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - storage_data:/app/storage
      - ../temp:/app/models-host:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    container_name: atlas-vox-frontend
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-3100}:80"
    depends_on:
      - backend
    healthcheck:
      # Alpine-based nginx doesn't have curl — use wget instead
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - frontend
    restart: unless-stopped

  redis:
    container_name: atlas-vox-redis
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - backend
    restart: unless-stopped

  worker:
    container_name: atlas-vox-worker
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --queues=default,preprocessing,training --concurrency=2
    environment:
      - DATABASE_URL=postgresql+asyncpg://atlas_vox:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@atlas-vox-postgres:5432/atlas_vox
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@atlas-vox-redis:6379/1
      - STORAGE_PATH=/app/storage
      - APP_ENV=${APP_ENV:-production}
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set}
    volumes:
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 8G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - backend
    restart: unless-stopped

  celery-beat:
    container_name: atlas-vox-beat
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    command: celery -A app.tasks.celery_app beat --loglevel=info --schedule=/var/run/celery/celerybeat-schedule
    environment:
      - DATABASE_URL=postgresql+asyncpg://atlas_vox:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@atlas-vox-postgres:5432/atlas_vox
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@atlas-vox-redis:6379/1
      - STORAGE_PATH=/app/storage
      - APP_ENV=${APP_ENV:-production}
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set}
    volumes:
      - storage_data:/app/storage
      - celerybeat_schedule:/var/run/celery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - backend
    restart: unless-stopped

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  storage_data:
  redis_data:
  pg_data:
  celerybeat_schedule:
