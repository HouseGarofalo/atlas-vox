name: atlas-vox

services:
  backend:
    container_name: atlas-vox-backend
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "${BACKEND_PORT:-8100}:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/atlas_vox.db
      - REDIS_URL=redis://:${REDIS_PASSWORD:-atlas-vox-redis}@atlas-vox-redis:6379/1
      - AUTH_DISABLED=${AUTH_DISABLED:-true}
      - STORAGE_PATH=/app/storage
      - PORT=8000
      - GPU_SERVICE_URL=http://host.docker.internal:8200
      - APP_ENV=production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - storage_data:/app/storage
      - db_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

  frontend:
    container_name: atlas-vox-frontend
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-3100}:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  redis:
    container_name: atlas-vox-redis
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-atlas-vox-redis}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-atlas-vox-redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  worker:
    container_name: atlas-vox-worker
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --queues=default,preprocessing,training --concurrency=2
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/atlas_vox.db
      - REDIS_URL=redis://:${REDIS_PASSWORD:-atlas-vox-redis}@atlas-vox-redis:6379/1
      - STORAGE_PATH=/app/storage
    volumes:
      - storage_data:/app/storage
      - db_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 8G
    restart: unless-stopped

volumes:
  storage_data:
  redis_data:
  db_data:
